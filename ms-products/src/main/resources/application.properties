spring.application.name=ms-products
server.port=${PORT:0}
eureka.instance.instance-id=${spring.cloud.client.hostname}:${spring.application.name}:${random.value}

#Configurar MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_URL:mysql-local:3306}/db_springboot_cloud
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:admin12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=${EUREKA_URL:http://eureka-server:8761/eureka}

#Micrometer
#management.tracing.sampling.probability=1.0
#management.zipkin.tracing.endpoint=http://zipkin-server:9411/api/v2/spans
#management.observations.http.server.requests.enabled=true
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}  %5p ${PID:- } --- [${spring.application.name:-}] [%15.15t] [%X{traceId}-%X{spanId}] %-40.40logger{39} : %m%n%wEx